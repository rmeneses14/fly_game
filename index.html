<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Baloo Adventure</title>
  <link rel="manifest" href="/fly_game/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#3ECFCF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Baloo" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3ECFCF;
      --green: #46B37F;
      --coral: #EF6F55;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#111;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
      font-family:'Luckiest Guy',cursive;
      overflow:hidden;
      touch-action:manipulation;
      user-select:none; -webkit-user-select:none;
      padding-top:var(--safe-top);
      padding-bottom:var(--safe-bottom);
    }
    #gameWrapper { position:relative; }
    canvas { display:block; }

    .screen {
      position:absolute; top:0; left:0; right:0; bottom:0;
      display:flex; flex-direction:column; align-items:center;
      pointer-events:none; opacity:0; transition:opacity 0.25s;
    }
    .screen.active { opacity:1; pointer-events:all; }

    /* MENU */
    #menuScreen {
      justify-content:space-between;
      padding:5% 20px 4%;
    }
    .game-title {
      font-size:clamp(50px,13vw,82px);
      color:#46B37F;
      text-shadow:3px 3px 0 rgba(0,160,160,0.35),-1px -1px 0 rgba(255,255,255,0.55);
      text-align:center; line-height:1.05;
      margin-top:6%;
      animation:titleBounce 2.2s ease-in-out infinite;
    }
    @keyframes titleBounce {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
    }
    #menuPlane {
      margin:2% auto 0;
      image-rendering:pixelated;
      animation:planeSway 1.8s ease-in-out infinite;
    }
    @keyframes planeSway {
      0%,100%{transform:translateY(0) rotate(-3deg)}
      50%{transform:translateY(-16px) rotate(2deg)}
    }
    .press-play {
      font-size:clamp(20px,5vw,32px);
      color:#3ECFCF;
      text-shadow:2px 2px 0 rgba(0,80,80,0.3),-1px -1px 0 #fff;
      text-align:center;
      animation:flash 1.3s ease-in-out infinite;
    }
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hs-bar {
      width:100%; display:flex; justify-content:space-between;
      align-items:center; padding:0 6px 2%;
    }
    .hs-bar span {
      font-size:clamp(15px,3.5vw,22px);
      color:#EF6F55;
      text-shadow:1px 1px 0 rgba(0,0,0,0.2);
      letter-spacing:2px;
    }

    /* HUD */
    #hud {
      position:absolute; top:0; left:0; right:0;
      padding:10px 14px; pointer-events:none;
    }
    #scoreDisplay {
      font-size:clamp(28px,7vw,46px);
      color:#46B37F;
      text-shadow:2px 2px 0 rgba(0,0,0,0.35),-1px -1px 0 rgba(255,255,255,0.4);
      display:none;
    }

    /* GAME OVER */
    #gameOverScreen {
      background:rgba(0,10,25,0.82);
      backdrop-filter:blur(6px);
      justify-content:center; gap:4%;
    }
    .go-title {
      font-size:clamp(44px,12vw,74px);
      color:#EF6F55;
      text-shadow:3px 3px 0 rgba(180,30,0,0.45);
      animation:goShake 0.35s ease-out;
    }
    @keyframes goShake { 0%{transform:scale(1.5)} 100%{transform:scale(1)} }
    .panel {
      background:rgba(255,255,255,0.07);
      border:2px solid rgba(255,255,255,0.13);
      border-radius:18px; padding:18px 38px; text-align:center;
    }
    .panel .lbl {
      font-family:'Nunito',sans-serif; font-weight:900;
      font-size:clamp(12px,2.5vw,17px);
      color:rgba(255,255,255,0.45); letter-spacing:3px; text-transform:uppercase;
    }
    .panel .val {
      font-size:clamp(38px,9vw,62px);
      color:#5DD68A;
      text-shadow:2px 2px 0 rgba(0,70,30,0.5);
    }
    .panel .val.best { color:#FFD700; font-size:clamp(28px,7vw,48px); }
    #restartBtn {
      font-family:'Luckiest Guy',cursive;
      font-size:clamp(19px,4.5vw,27px);
      color:#fff; background:linear-gradient(135deg,#46B37F,#3ECFCF);
      border:none; border-radius:50px; padding:13px 42px;
      cursor:pointer; letter-spacing:2px;
      box-shadow:0 6px 20px rgba(62,207,207,0.4);
      -webkit-tap-highlight-color:transparent;
      transition:transform 0.1s;
    }
    #restartBtn:active { transform:scale(0.94); }

    #pwa-install-btn {
      position:fixed; bottom:calc(20px + var(--safe-bottom)); right:20px;
      font-family:'Nunito',sans-serif; font-weight:900; font-size:14px;
      background:linear-gradient(135deg,#46B37F,#3ECFCF); color:#fff;
      border:none; border-radius:24px; padding:12px 22px; cursor:pointer;
      box-shadow:0 4px 20px rgba(62,207,207,0.6);
      z-index:9999; display:none; flex-direction:row;
      align-items:center; gap:8px;
      animation: pwaGlow 2s ease-in-out infinite;
    }
    @keyframes pwaGlow {
      0%,100%{box-shadow:0 4px 20px rgba(62,207,207,0.6)}
      50%{box-shadow:0 4px 32px rgba(62,207,207,1), 0 0 20px rgba(62,207,207,0.4)}
    }
    @media (max-width:480px) {
      .panel { padding:14px 26px; }
      #restartBtn { padding:11px 34px; }
    }
  </style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="hud"><div id="scoreDisplay">0</div></div>

  <div id="menuScreen" class="screen active">
    <h1 class="game-title">BALOO<br>ADVENTURE</h1>
    <canvas id="menuPlane" width="264" height="219"></canvas>
    <p class="press-play">TOCA O PRESIONA ESPACIO<br>PARA JUGAR</p>
    <div class="hs-bar">
      <span>HIGHSCORE</span>
      <span id="menuHS">0</span>
    </div>
  </div>

  <div id="gameOverScreen" class="screen">
    <h2 class="go-title">GAME OVER</h2>
    <div class="panel"><p class="lbl">SCORE</p><p class="val" id="goScore">0</p></div>
    <div class="panel"><p class="lbl">BEST</p><p class="val best" id="goBest">0</p></div>
    <button id="restartBtn" onclick="restartGame()">¡OTRA VEZ!</button>
  </div>
</div>
<button id="pwa-install-btn" onclick="pwaInstall()">📲 Instalar App</button>

// ── CONSTANTS (mirrored from Godot) ──────────────────────────────────────────
const GRAVITY     = 1800;   // personaje.gd: GRAVEDAD 1000 * scale
const FLAP_POWER  = -520;   // personaje.gd: POWER -400 * scale
const PIPE_SPEED  = 220;    // pipes.gd: SCROLL_SPEED 120 * scale
const PIPE_GAP    = 200;    // gap between top and bottom pipe
const PIPE_W      = 68;
const SPAWN_SECS  = 1.9;    // fly_game.gd: SpawnTimer
const FRAME_W     = 264;
const FRAME_H     = 219;
const FRAME_COUNT = 3;
const FRAME_RATE  = 10;     // main.tscn: speed 10.0 fps

// ── STATE ─────────────────────────────────────────────────────────────────────
let canvas, ctx, W, H;
let state = 'menu';
let score = 0;
let highScore = parseInt(localStorage.getItem('balooBest') || '0');
let lastTime = 0;
let plane = {};
let pipes = [];
let spawnTimer = 0;
let clouds = [];
let bgX = 0;
let deathRot = 0;
let engineT = 0;
let frameIdx = 0;
let frameT = 0;
let popups = [];
let imgSky, imgBaloo, imgPipe;

// ── LOAD ASSETS ───────────────────────────────────────────────────────────────
function loadAssets(cb) {
  let loaded = 0;
  const done = () => { if (++loaded === 3) cb(); };
  imgSky   = new Image(); imgSky.onload   = done; imgSky.src   = SKY_SRC;
  imgBaloo = new Image(); imgBaloo.onload = done; imgBaloo.src = BALOO_SRC;
  imgPipe  = new Image(); imgPipe.onload  = done; imgPipe.src  = PIPE_SRC;
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); handleInput(); }
  });
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleInput(); });
  document.getElementById('menuScreen').addEventListener('pointerdown', e => {
    e.preventDefault(); handleInput();
  });
  document.getElementById('menuHS').textContent = highScore;
  loadAssets(() => {
    drawMenuSprite();
    generateClouds();
    requestAnimationFrame(loop);
  });
}

function resize() {
  W = Math.min(window.innerWidth, 430);
  H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const w = document.getElementById('gameWrapper');
  w.style.width = W+'px'; w.style.height = H+'px';
}

function drawMenuSprite() {
  const mc = document.getElementById('menuPlane');
  const mctx = mc.getContext('2d');
  mctx.imageSmoothingEnabled = false;
  mctx.clearRect(0, 0, 176, 146);
  // Draw 2x scaled first frame
  mctx.drawImage(imgBaloo, 0, 0, FRAME_W, FRAME_H, 0, 0, 264, 219);
}

function generateClouds() {
  clouds = [];
  for (let i = 0; i < 8; i++) {
    clouds.push({
      x: Math.random() * W * 1.6,
      y: H * 0.04 + Math.random() * H * 0.40,
      s: 0.4 + Math.random() * 0.7,
      sp: 15 + Math.random() * 22,
      a: 0.55 + Math.random() * 0.35,
    });
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function handleInput() {
  if (state === 'menu') startGame();
  else if (state === 'playing') flap();
}

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; pipes = []; spawnTimer = 0; popups = [];
  deathRot = 0; engineT = 0; frameIdx = 0; frameT = 0;
  plane = { x: W * 0.2, y: H * 0.43, vy: 0, dead: false };
  document.getElementById('menuScreen').classList.remove('active');
  document.getElementById('gameOverScreen').classList.remove('active');
  document.getElementById('scoreDisplay').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = '0';
  state = 'playing';
  spawnPipe();
}

function flap() {
  if (plane.dead) return;
  plane.vy = FLAP_POWER;
}

function spawnPipe() {
  pipes.push({
    x: W + 20,
    gapY: H * 0.22 + Math.random() * (H * 0.72 - H * 0.22),
    scored: false,
    laserT: Math.random() * Math.PI * 2,
  });
}

function update(dt) {
  if (state !== 'playing') return;

  engineT += dt;
  frameT  += dt;
  if (frameT > 1 / FRAME_RATE) { frameT = 0; frameIdx = (frameIdx + 1) % FRAME_COUNT; }

  // Plane physics  (mirrors personaje.gd _physics_process)
  plane.vy += GRAVITY * dt;
  plane.y  += plane.vy * dt;

  const planeH = FRAME_H * getScale() * 0.55;
  const floor  = H - 32;

  if (plane.y + planeH >= floor) {
    plane.y = floor - planeH;
    triggerDeath(); return;
  }
  if (plane.y - planeH <= 0) {
    plane.y = planeH;
    plane.vy = Math.max(0, plane.vy);
  }

  spawnTimer += dt;
  if (spawnTimer >= SPAWN_SECS) { spawnTimer = 0; spawnPipe(); }

  bgX -= 40 * dt;

  pipes = pipes.filter(p => p.x + PIPE_W > -80);
  for (const p of pipes) {
    p.x    -= PIPE_SPEED * dt;
    p.laserT += dt * 4.5;

    // Score detection (mirrors _on_laser_body_entered)
    const lx   = p.x + PIPE_W / 2;
    const lxPrev = lx + PIPE_SPEED * dt;
    if (!p.scored && lxPrev >= plane.x && lx < plane.x) {
      const scale = getScale();
      const pT = plane.y - FRAME_H * scale * 0.48;
      const pB = plane.y + FRAME_H * scale * 0.48;
      const gT = p.gapY - PIPE_GAP / 2;
      const gB = p.gapY + PIPE_GAP / 2;
      if (pT > gT && pB < gB) {
        score++;
        p.scored = true;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('balooBest', highScore);
        }
        document.getElementById('scoreDisplay').textContent = score;
        popups.push({ x: plane.x + 10, y: plane.y - 30, t: 0.8 });
      }
    }

    // Collision detection (mirrors _on_pipe_body_entered)
    if (!plane.dead) {
      const scale = getScale();
      const pW = FRAME_W * scale * 0.52;
      const pH = FRAME_H * scale * 0.52;
      const plL = plane.x - pW, plR = plane.x + pW;
      const plT = plane.y - pH, plB = plane.y + pH;
      const piL = p.x,         piR = p.x + PIPE_W;
      const gT  = p.gapY - PIPE_GAP / 2;
      const gB  = p.gapY + PIPE_GAP / 2;
      if (plR > piL && plL < piR && (plT < gT || plB > gB)) {
        triggerDeath();
      }
    }
  }

  for (const c of clouds) {
    c.x -= c.sp * dt;
    if (c.x < -180) { c.x = W + 60; c.y = H * 0.04 + Math.random() * H * 0.40; }
  }

  popups = popups.filter(pp => pp.t > 0);
  for (const pp of popups) { pp.y -= 58 * dt; pp.t -= dt; }
}

function getScale() {
  return (W * 0.18) / FRAME_W;
}

function triggerDeath() {
  if (plane.dead) return;
  plane.dead = true;
  state = 'dead';
  setTimeout(() => {
    document.getElementById('goScore').textContent = score;
    document.getElementById('goBest').textContent  = highScore;
    document.getElementById('menuHS').textContent  = highScore;
    document.getElementById('gameOverScreen').classList.add('active');
    document.getElementById('scoreDisplay').style.display = 'none';
  }, 950);
}

function restartGame() {
  document.getElementById('gameOverScreen').classList.remove('active');
  startGame();
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawClouds();
  drawPipes();
  drawPlane();
  drawGround();
  drawPopups();
  if (state === 'dead' && !document.getElementById('gameOverScreen').classList.contains('active')) {
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawSky() {
  if (!imgSky.complete || !imgSky.naturalWidth) return;
  const aspect = imgSky.naturalWidth / imgSky.naturalHeight;
  const dH = H;
  const dW = dH * aspect;
  const offset = ((-bgX * 0.12) % dW + dW) % dW;
  ctx.drawImage(imgSky, -offset, 0, dW, dH);
  if (dW - offset < W) ctx.drawImage(imgSky, dW - offset, 0, dW, dH);
}

function drawClouds() {
  for (const c of clouds) {
    ctx.save();
    ctx.globalAlpha = c.a;
    ctx.translate(c.x, c.y);
    const sc = c.s * (W / 420);
    ctx.scale(sc, sc * 0.55);
    ctx.fillStyle = '#E8F8FF';
    ctx.beginPath();
    ctx.ellipse(0, 0, 62, 32, 0, 0, Math.PI * 2);
    ctx.ellipse(-38, 10, 38, 26, 0, 0, Math.PI * 2);
    ctx.ellipse(38, 10, 38, 26, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPipes() {
  for (const p of pipes) {
    const gapTop = p.gapY - PIPE_GAP / 2;
    const gapBot = p.gapY + PIPE_GAP / 2;
    const topH   = gapTop;
    const botH   = H - gapBot - 28;

    // Top pipe (rotated 180°)
    if (topH > 0) {
      ctx.save();
      ctx.translate(p.x + PIPE_W / 2, gapTop / 2);
      ctx.scale(1, -1);
      drawPipeBody(-(PIPE_W/2), -(topH/2), PIPE_W, topH);
      ctx.restore();
      drawPipeCap(p.x - 5, gapTop - 14, PIPE_W + 10, 14);
    }

    // Bottom pipe
    if (botH > 0) {
      drawPipeCap(p.x - 5, gapBot, PIPE_W + 10, 14);
      drawPipeBody(p.x, gapBot + 14, PIPE_W, botH);
    }

    drawLaser(p.x + PIPE_W / 2, gapTop, gapBot, p.laserT);
  }
}

function drawPipeBody(x, y, w, h) {
  if (h <= 0 || !imgPipe.complete) return;
  const iH = imgPipe.naturalHeight || 400;
  const iW = imgPipe.naturalWidth  || 61;
  let drawn = 0;
  while (drawn < h) {
    const chunk = Math.min(iH, h - drawn);
    const dh = chunk * (w / iW);
    ctx.drawImage(imgPipe, 0, 0, iW, chunk, x, y + drawn, w, dh);
    drawn += dh;
    if (dh <= 0) break;
  }
}

function drawPipeCap(x, y, w, h) {
  const g = ctx.createLinearGradient(x, 0, x + w, 0);
  g.addColorStop(0,   '#9AAAB4');
  g.addColorStop(0.18,'#D8E8F0');
  g.addColorStop(0.55,'#BCCCD4');
  g.addColorStop(1,   '#8A9AA4');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(x, y, w, 4);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x, y + h - 3, w, 3);
}

function drawLaser(cx, top, bot, t) {
  const pulse = Math.sin(t) * 0.28 + 0.72;
  const h = bot - top;
  ctx.save();
  ctx.shadowColor = '#44FF88';
  ctx.shadowBlur  = 20 * pulse;
  // Outer glow
  ctx.fillStyle = `rgba(70,255,120,${0.22 * pulse})`;
  ctx.fillRect(cx - 10, top, 20, h);
  // Mid beam
  ctx.fillStyle = `rgba(150,255,180,${0.88 * pulse})`;
  ctx.fillRect(cx - 4,  top, 8,  h);
  // Bright core
  ctx.shadowBlur = 6;
  ctx.fillStyle = `rgba(240,255,248,${0.95 * pulse})`;
  ctx.fillRect(cx - 1.5, top, 3, h);
  ctx.restore();
}

function drawPlane() {
  if (!plane.x || !imgBaloo.complete || !imgBaloo.naturalWidth) return;
  const scale = getScale();
  const dW = FRAME_W * scale;
  const dH = FRAME_H * scale;

  ctx.save();
  ctx.translate(plane.x, plane.y);

  if (plane.dead) {
    deathRot += 0.14;
    ctx.rotate(deathRot);
  } else {
    // Tilt based on vertical velocity (mirrors personaje.gd tilt)
    const tilt = Math.max(-0.44, Math.min(0.44, plane.vy / 1700));
    ctx.rotate(tilt);
  }

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(
    imgBaloo,
    frameIdx * FRAME_W, 0, FRAME_W, FRAME_H,
    -dW / 2, -dH / 2, dW, dH
  );
  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#8B7540';
  ctx.fillRect(0, H - 32, W, 32);
  ctx.fillStyle = '#7A6438';
  ctx.fillRect(0, H - 32, W, 4);
}

function drawPopups() {
  for (const pp of popups) {
    ctx.save();
    ctx.globalAlpha  = pp.t / 0.8;
    ctx.font         = `bold ${Math.round(W * 0.07)}px "Luckiest Guy", cursive`;
    ctx.fillStyle    = '#5DD68A';
    ctx.shadowColor  = '#00FF80';
    ctx.shadowBlur   = 12;
    ctx.fillText('+1', pp.x, pp.y);
    ctx.restore();
  }
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── PWA ───────────────────────────────────────────────────────────────────────
let deferredPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                  || navigator.standalone === true;

// Mostrar botón siempre que la app no esté instalada
window.addEventListener('load', () => {
  if (!isStandalone) {
    document.getElementById('pwa-install-btn').style.display = 'flex';
  }
});

// Android/Chrome: captura prompt nativo del sistema
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function pwaInstall() {
  if (deferredPrompt) {
    // Android/Chrome: prompt nativo del sistema
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      deferredPrompt = null;
      if (choice.outcome === 'accepted')
        document.getElementById('pwa-install-btn').style.display = 'none';
    });
  } else if (isIOS) {
    alert('Para instalar en iPhone/iPad:\n\n1. Toca el ícono Compartir (□↑) en Safari\n2. Selecciona "Añadir a pantalla de inicio"\n3. ¡Listo! Baloo en tu homescreen 🐕✈️');
  } else {
    // Android: beforeinstallprompt no llegó aún — instrucciones manuales
    alert('Para instalar Baloo Adventure:\n\n1. Toca el menú ⋮ (tres puntos) en Chrome\n2. Selecciona "Añadir a pantalla de inicio" o "Instalar app"\n3. ¡Listo! 🐕✈️');
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install-btn').style.display = 'none';
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/fly_game/sw.js', { scope: '/fly_game/' })
      .then(r => console.log('SW registrado:', r.scope))
      .catch(e => console.warn('SW error:', e));
  });
}

window.addEventListener('load', init);
</script>
